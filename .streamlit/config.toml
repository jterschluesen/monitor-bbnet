[theme]
base = "light"

# General color setup
textColor = "#0f172a"
primaryColor = "#615fff"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"

# Widgets
showWidgetBorder = true
borderColor = "#dbe2ea"

# Dataframes
dataframeHeaderBackgroundColor = "#f8fafc"

# Base text
font = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
baseFontWeight = 300
baseFontSize = 14

# Heading text
headingFont = "Space Grotesk"
headingFontWeights = [300, 400, 400, 300, 300, 300]
headingFontSizes = ["2.5rem", "1.5rem", "1rem"]

[client]
showSidebarNavigation = false
